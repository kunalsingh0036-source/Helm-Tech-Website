<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- V3: H inside a compass circle — clean outline style -->
  <circle cx="50" cy="50" r="46" stroke="#2ECC71" stroke-width="4" fill="none"/>
  <!-- N/S/E/W tick marks -->
  <line x1="50" y1="0" x2="50" y2="10" stroke="#2ECC71" stroke-width="3" stroke-linecap="round"/>
  <line x1="50" y1="90" x2="50" y2="100" stroke="#2ECC71" stroke-width="3" stroke-linecap="round"/>
  <line x1="0" y1="50" x2="10" y2="50" stroke="#2ECC71" stroke-width="3" stroke-linecap="round"/>
  <line x1="90" y1="50" x2="100" y2="50" stroke="#2ECC71" stroke-width="3" stroke-linecap="round"/>
  <!-- H inside -->
  <rect x="28" y="22" width="10" height="56" rx="2" fill="#2ECC71"/>
  <rect x="62" y="22" width="10" height="56" rx="2" fill="#2ECC71"/>
  <rect x="28" y="45" width="44" height="10" rx="2" fill="#2ECC71"/>
</svg>
